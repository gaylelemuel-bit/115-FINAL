<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - 115 Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="main-card">
        <!-- Left Sidebar:  images/text -->
        <section class="sidebar">
            <div class="sidebar-item">
                <img src="https://images.unsplash.com/photo-1729188430325-eb540fcdd941?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8MTh8fHxlbnwwfHx8fHw%3D" alt="Sunset with mountains">
            </div>
            <div class="sidebar-info-box">
                <span class="step-number">1</span>
                <p>Register with us; enter your details and click on "Register Button".</p>
            </div>
            <div class="sidebar-item">
                <img src="https://media.istockphoto.com/id/1351448079/photo/eco-friendly-open-plan-modern-office-with-tables-office-chairs-pendant-lights-and-plants.webp?a=1&b=1&s=612x612&w=0&k=20&c=UuDoDWnmwMKCyWMD2jH5fCgG5gARfqKIly6lNKfpPQs=" alt="office space with greenry">
            </div>
            <div class="sidebar-info-box">
                <span class="step-number">2</span>
                <p>Select "7 day trial" or Pay for "Enterprise Package".</p>
            </div>
        </section>

        <!-- Right Side: Form -->
        <section class="form-container">
            <h1>Register</h1>
            <form action="#">
                <div class="form-grid">
                    <div class="field-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="BigMike03">
                    </div>
                    <div class="field-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="B_Michael03@gmail.com">
                    </div>
                    <div class="field-group">
                        <label for="phone">Contact Number</label>
                        <input type="tel" id="phone" placeholder="+1(817)789-6543">
                    </div>
                    <div class="field-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" placeholder="3567 Cedarhill Ave, Dallas TX 75112">
                    </div>
                    <div class="field-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="*****************">
                    </div>
                    <div class="field-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="*****************">
                        <span class="error-text">Password Required</span>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-register">Register</button>
                </div>
            </form>
            
        </section>
    </main>
</body>
</html>
